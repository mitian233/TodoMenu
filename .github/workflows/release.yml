name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            target: arm64-apple-macos
          - arch: x86_64
            target: x86_64-apple-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild build \
            -scheme TodoMenu \
            -destination 'platform=macOS' \
            -configuration Release \
            ARCHS=${{ matrix.arch }} \
            -derivedDataPath build

      - name: Create DMG
        run: |
          cd build/Build/Products/Release
          hdiutil create -volname "TodoMenu" -srcfolder TodoMenu.app -ov -format UDZO TodoMenu-${{ matrix.arch }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TodoMenu-${{ matrix.arch }}
          path: build/Build/Products/Release/TodoMenu-${{ matrix.arch }}.dmg

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TodoMenu-arm64
          path: artifacts

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TodoMenu-x86_64
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.dmg
          generate_release_notes: true
